<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Prediction</title>

    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family:Arial,sans-serif;
        background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .container{
        width:700px;
        background:white;
        padding:35px;
        border-radius:20px;
        box-shadow:0px 10px 30px rgba(0,0,0,0.3);
    }

    h1{
        text-align:center;
        color:#2c5364;
        margin-bottom:10px;
    }

    .subtitle{
        text-align:center;
        color:gray;
        margin-bottom:25px;
    }

    label{
        font-weight:bold;
        display:block;
        margin-top:10px;
    }

    input{
        width:100%;
        padding:12px;
        margin-top:5px;
        margin-bottom:15px;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:16px;
    }

    input:focus{
        outline:none;
        border:2px solid #2c5364;
    }

    button{
        width:100%;
        padding:14px;
        background:#2c5364;
        color:white;
        border:none;
        border-radius:8px;
        font-size:18px;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        background:#203a43;
    }

    .result{
        margin-top:25px;
        text-align:center;
        font-size:24px;
        font-weight:bold;
    }

    </style>

</head>

<body>

<div class="container">

<h1>🏦 Loan Approval Prediction</h1>

<p class="subtitle">
Check whether a loan application is likely to be approved or rejected.
</p>

<form action="/predict" method="POST">

<label>Income</label>
<input type="number" name="income" required>

<label>Credit Score</label>
<input type="number" name="credit_score" required>

<label>Loan Amount</label>
<input type="number" name="loan_amount" required>

<label>Years Employed</label>
<input type="number" name="years_employed" required>

<label>Points</label>
<input type="number" name="points" required>

<button type="submit">
Predict Loan Status
</button>

</form>

<div class="result">

{% if prediction %}

Loan Status : {{ prediction }}

{% endif %}

</div>

</div>

</body>
</html>
